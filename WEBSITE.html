<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suraj Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    background:#f4f6f9;
    overflow:hidden;
}

/* ---------- NAVBAR ---------- */

nav{
    position:fixed;
    top:-65px;
    left:0;
    width:100%;
    height:65px;
    background:#1e293b;
    color:#fff;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 25px;
    transition:top .3s ease;
    z-index:9999;
}

nav.show{
    top:0;
}

nav b{
    font-size:20px;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:25px;
    cursor:pointer;
    font-weight:bold;
    transition:.2s;
}

nav a:hover{
    color:#38bdf8;
}

/* Invisible strip to show navbar */

#trigger{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:15px;
    z-index:10000;
}

/* ---------- Pages ---------- */

.page{
    display:none;
    width:100%;
    height:100vh;
}

.page.active{
    display:block;
}

/* ---------- Home ---------- */

.hero{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.hero h1{
    font-size:48px;
    color:#1e293b;
}

.hero p{
    margin-top:15px;
    font-size:20px;
    color:#666;
}

/* ---------- About ---------- */

.about{
    padding:60px;
    font-size:22px;
    line-height:1.8;
}

/* ---------- iframe ---------- */

iframe{
    width:100%;
    height:100vh;
    border:none;
}

</style>

</head>
<body>

<div id="trigger"></div>

<nav id="navbar">

<div>
<b>📊 Dashboard</b>
</div>

<div>

<a onclick="showPage('home')">Home</a>

<a onclick="showPage('dashboard')">Dashboard</a>

<a onclick="showPage('dyeing')">Dyeing Dashboard</a>

<a onclick="showPage('about')">About</a>

</div>

</nav>

<!-- HOME -->

<div id="home" class="page">

<div class="hero">

<h1>👋 Welcome to My Dashboard</h1>

<p>
A collection of business dashboards built using
HTML, CSS, JavaScript, Google Sheets and Apps Script.
</p>

<br><br>

</div>

</div>

<!-- DASHBOARD (DEFAULT) -->

<div id="dashboard" class="page active">

<iframe src="https://suarjthakur.github.io/Company-Dashboard/"></iframe>

</div>

<!-- DYEING DASHBOARD -->

<div id="dyeing" class="page">

<iframe src="https://suarjthakur.github.io/Company-Dashboard/dyeing_dashboard.html"></iframe>

</div>

<!-- ABOUT -->

<div id="about" class="page">

<div class="about">

<h1>About Me</h1>


</div>

</div>

<script>

function showPage(id){

document.querySelectorAll(".page").forEach(function(page){

page.classList.remove("active");

});

document.getElementById(id).classList.add("active");

}

// ---------------- NAVBAR ----------------

const nav=document.getElementById("navbar");
const trigger=document.getElementById("trigger");

let hideTimer;

// Show navbar
function showNav(){

clearTimeout(hideTimer);

nav.classList.add("show");

}

// Hide navbar after 1.5 sec
function hideNav(){

hideTimer=setTimeout(function(){

nav.classList.remove("show");

},1500);

}

trigger.addEventListener("mouseenter",showNav);

nav.addEventListener("mouseenter",showNav);

nav.addEventListener("mouseleave",hideNav);

</script>

</body>
</html>
